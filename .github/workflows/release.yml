name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        run: |
          npm --prefix web ci --no-audit --no-fund
          npm --prefix web run build -- --mode production

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath -ldflags='-s -w' -o "dist/xpanel-linux-${GOARCH}" ./cmd/xpanel
          sha256sum "dist/xpanel-linux-${GOARCH}" > "dist/xpanel-linux-${GOARCH}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpanel-linux-${{ matrix.arch }}
          path: |
            dist/xpanel-linux-${{ matrix.arch }}
            dist/xpanel-linux-${{ matrix.arch }}.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
